<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Molinello Match Center</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --green: #2e7d32; --red: #d32f2f; --dark: #1a1a1a; --light: #f4f4f9; }
        body { font-family: -apple-system, sans-serif; background: var(--dark); margin: 0; padding: 10px; display: flex; justify-content: center; height: 100vh; box-sizing: border-box; overflow: hidden; }
        .app-card { background: var(--light); width: 100%; max-width: 400px; border-radius: 25px; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        .timer-section { background: #fff; border-radius: 20px; padding: 10px; text-align: center; box-shadow: inset 0 2px 5px rgba(0,0,0,0.1); }
        #timer-display { font-size: 3.5rem; font-weight: 800; margin: 5px 0; }
        .presets { display: flex; justify-content: center; gap: 5px; margin-bottom: 8px; }
        .btn-p { padding: 8px 15px; border: 2px solid #ddd; border-radius: 10px; background: white; font-weight: bold; }
        .btn-p.active { background: var(--green); color: white; border-color: var(--green); }
        
        .action-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 5px; }
        .btn-main { width: 100%; padding: 14px; border-radius: 12px; border: none; font-size: 1rem; font-weight: bold; color: white; }
        .btn-start { background: var(--dark); grid-column: span 2; }
        .btn-share { background: #25D366; font-size: 0.85rem; }
        .btn-reset { background: var(--red); font-size: 0.85rem; }

        .scoreboard { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 5px; }
        .team-col { background: white; padding: 15px 10px; border-radius: 20px; display: flex; flex-direction: column; align-items: center; }
        .team-input { width: 90%; border: none; text-align: center; font-weight: 900; text-transform: uppercase; border-bottom: 2px solid #eee; margin-bottom: 5px; }
        .score-num { font-size: 4rem; font-weight: 900; margin: 5px 0; line-height: 1; }
        
        .btn-round { width: 65px; height: 65px; border-radius: 50%; border: none; color: white; font-size: 2rem; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        .btn-plus { background: var(--green); }
        .btn-minus { background: #bbb; width: 45px; height: 45px; font-size: 1.5rem; margin-top: 10px; }

        .expired { color: var(--red); animation: blink 0.8s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

<div class="app-card">
    <div class="timer-section">
        <div class="presets">
            <button class="btn-p" onclick="v(50);setT(15, this)">15m</button>
            <button class="btn-p active" onclick="v(50);setT(20, this)">20m</button>
            <button class="btn-p" onclick="v(50);setCustom(this)">...</button>
        </div>
        <div id="timer-display">20:00</div>
        
        <div class="action-bar">
            <button id="startBtn" class="btn-main btn-start" onclick="toggleT()">AVVIA PARTITA</button>
            <button class="btn-main btn-share" onclick="v(50);sh()">WHATSAPP</button>
            <button class="btn-main btn-reset" onclick="rs()">AZZERA</button>
        </div>
    </div>

    <div class="scoreboard">
        <div class="team-col">
            <input type="text" id="t1" class="team-input" value="MOLINELLO">
            <button class="btn-round btn-plus" onclick="sc('s1',1)">+</button>
            <div id="s1" class="score-num">0</div>
            <button class="btn-round btn-minus" onclick="sc('s1',-1)">-</button>
        </div>
        <div class="team-col">
            <input type="text" id="t2" class="team-input" value="SQUADRA 2">
            <button class="btn-round btn-plus" onclick="sc('s2',1)">+</button>
            <div id="s2" class="score-num">0</div>
            <button class="btn-round btn-minus" onclick="sc('s2',-1)">-</button>
        </div>
    </div>
</div>

<audio id="whistleSound" preload="auto">
    <source src="fischio.mp3" type="audio/mpeg">
</audio>

<script>
    let t = 1200, r = false, iv = null;
    const whistle = document.getElementById('whistleSound');

    function v(ms) { if(navigator.vibrate) navigator.vibrate(ms); }

    function up() {
        let m = Math.floor(t/60), s = t%60;
        let d = document.getElementById('timer-display');
        d.innerText = `${m}:${s < 10 ? '0'+s : s}`;
        if(t <= 0) d.classList.add('expired'); else d.classList.remove('expired');
    }

    function setT(m, b) {
        if(r) return; t = m*60; up();
        document.querySelectorAll('.btn-p').forEach(p => p.classList.remove('active'));
        b.classList.add('active');
    }

    function setCustom(b) {
        if(r) return;
        let m = prompt("Minuti?", "25");
        if(m) setT(parseInt(m), b);
    }

    function toggleT() {
        // "Sveglia" l'audio al primo tocco
        whistle.play().then(() => { whistle.pause(); whistle.currentTime = 0; }).catch(() => {});
        
        let b = document.getElementById('startBtn'); v(100);
        if(r) { clearInterval(iv); r = false; b.innerText = "RIPRENDI"; }
        else {
            if(t <= 0) return; r = true; b.innerText = "PAUSA";
            iv = setInterval(() => { 
                t--; up(); 
                if(t <= 0) { 
                    clearInterval(iv); r = false; 
                    whistle.play();
                    // VIBRAZIONE LUNGA STILE TELEFONATA (3 colpi da 1.5 secondi)
                    v([1500, 300, 1500, 300, 1500]); 
                    setTimeout(() => { alert("FISCHIO FINALE!"); b.innerText = "FINE"; }, 200);
                } 
            }, 1000);
        }
    }

    function sc(id, val) {
        let e = document.getElementById(id), c = parseInt(e.innerText);
        if(c+val >= 0) { e.innerText = c+val; v(val > 0 ? 150 : 60); }
    }

    function rs() {
        v(200);
        if(confirm("Vuoi azzerare?") && confirm("Sicuro?")) location.reload();
    }

    function sh() {
        let n1 = document.getElementById('t1').value, n2 = document.getElementById('t2').value;
        let s1 = document.getElementById('s1').innerText, s2 = document.getElementById('s2').innerText;
        window.open(`https://wa.me/?text=${encodeURI('FINALE: '+n1+' '+s1+' - '+s2+' '+n2)}`);
    }
</script>
</body>
</html>

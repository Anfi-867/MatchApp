<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Molinello Match Center</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --green: #2e7d32; --red: #d32f2f; --dark: #1a1a1a; --light: #f4f4f9; --blue: #1976d2; }
        body { font-family: -apple-system, sans-serif; background: var(--dark); margin: 0; padding: 10px; display: flex; justify-content: center; height: 100vh; box-sizing: border-box; overflow: hidden; }
        .app-card { background: var(--light); width: 100%; max-width: 400px; border-radius: 25px; padding: 12px; display: flex; flex-direction: column; gap: 6px; position: relative; }
        
        /* TIMER */
        .timer-section { background: #fff; border-radius: 20px; padding: 8px; text-align: center; box-shadow: inset 0 2px 5px rgba(0,0,0,0.1); position: relative; }
        #timer-display { font-size: 3.2rem; font-weight: 800; margin: 0; }
        .wakelock-status { position: absolute; top: 8px; right: 12px; font-size: 0.5rem; color: #ccc; display: flex; align-items: center; gap: 3px; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: #ccc; }
        .dot.active { background: #4CAF50; }

        .presets { display: flex; justify-content: center; gap: 5px; margin-bottom: 5px; }
        .btn-p { padding: 5px 10px; border: 1px solid #ddd; border-radius: 8px; background: white; font-weight: bold; font-size: 0.75rem; }
        .btn-p.active { background: var(--green); color: white; border-color: var(--green); }
        
        .action-bar { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 5px; }
        .btn-main { padding: 10px; border-radius: 10px; border: none; font-size: 0.8rem; font-weight: bold; color: white; cursor: pointer; }
        .btn-start { background: var(--dark); grid-column: span 3; font-size: 1rem; }
        .btn-share { background: #25D366; }
        .btn-next { background: var(--blue); }
        .btn-reset { background: #666; }

        /* SCOREBOARD */
        .scoreboard { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .team-col { background: white; padding: 8px; border-radius: 18px; display: flex; flex-direction: column; align-items: center; border: 1px solid #eee; }
        .team-input { width: 90%; border: none; text-align: center; font-weight: 800; text-transform: uppercase; border-bottom: 1px solid #eee; font-size: 0.8rem; }
        .score-num { font-size: 3rem; font-weight: 900; margin: 0; line-height: 1.1; }
        .btn-round { width: 55px; height: 55px; border-radius: 50%; border: none; color: white; font-size: 1.8rem; display: flex; align-items: center; justify-content: center; }
        .btn-plus { background: var(--green); }
        .btn-minus { background: #bbb; width: 35px; height: 35px; font-size: 1rem; margin-top: 5px; }

        /* LOGS */
        .logs-container { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; flex-grow: 1; overflow: hidden; margin-top: 5px; }
        .log-box { background: #e8e8e8; border-radius: 12px; padding: 8px; overflow-y: auto; display: flex; flex-direction: column; }
        .log-title { font-size: 0.6rem; color: #777; font-weight: bold; text-transform: uppercase; margin-bottom: 4px; text-align: center; }
        .entry { background: white; padding: 4px 8px; border-radius: 6px; margin-bottom: 3px; font-size: 0.7rem; display: flex; justify-content: space-between; }
        .entry-period { border-left: 3px solid var(--blue); }
        .entry-goal { border-left: 3px solid var(--green); }

        .expired { color: var(--red); animation: blink 0.8s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

<div class="app-card">
    <div class="timer-section">
        <div class="wakelock-status"><div id="statusDot" class="dot"></div><span id="statusText">OFF</span></div>
        <div class="presets">
            <button class="btn-p" onclick="setT(15, this)">15m</button>
            <button class="btn-p active" onclick="setT(20, this)">20m</button>
            <button class="btn-p" onclick="setCustom(this)">...</button>
        </div>
        <div id="timer-display">20:00</div>
        <div class="action-bar">
            <button id="startBtn" class="btn-main btn-start" onclick="toggleT()">AVVIA PARTITA</button>
            <button class="btn-main btn-next" onclick="savePeriod()">FINE TEMPO</button>
            <button class="btn-main btn-share" onclick="sh()">WHATSAPP</button>
            <button class="btn-main btn-reset" onclick="rs()">AZZERA</button>
        </div>
    </div>

    <div class="scoreboard">
        <div class="team-col">
            <input type="text" id="t1" class="team-input" value="MOLINELLO">
            <button class="btn-round btn-plus" onclick="sc('s1',1, 't1')">+</button>
            <div id="s1" class="score-num">0</div>
            <button class="btn-round btn-minus" onclick="sc('s1',-1, 't1')">-</button>
        </div>
        <div class="team-col">
            <input type="text" id="t2" class="team-input" value="SQUADRA 2">
            <button class="btn-round btn-plus" onclick="sc('s2',1, 't2')">+</button>
            <div id="s2" class="score-num">0</div>
            <button class="btn-round btn-minus" onclick="sc('s2',-1, 't2')">-</button>
        </div>
    </div>

    <div class="logs-container">
        <div class="log-box" id="periodLog"><div class="log-title">Tempi</div></div>
        <div class="log-box" id="goalLog"><div class="log-title">Goal</div></div>
    </div>
</div>

<audio id="whistleSound" preload="auto"><source src="fischio.mp3" type="audio/mpeg"></audio>

<script>
    let t = 1200, initialT = 1200, r = false, iv = null, endTime = null;
    let wakeLock = null;
    let periods = [];
    const whistle = document.getElementById('whistleSound');

    function v(ms) { if(navigator.vibrate) navigator.vibrate(ms); }

    async function requestWakeLock() {
        if ('wakeLock' in navigator) {
            try {
                wakeLock = await navigator.wakeLock.request('screen');
                document.getElementById('statusDot').classList.add('active');
                document.getElementById('statusText').innerText = "LIVE";
            } catch (err) {}
        }
    }

    function up() {
        let displayT = Math.max(0, t);
        let m = Math.floor(displayT/60), s = displayT%60;
        document.getElementById('timer-display').innerText = `${m}:${s < 10 ? '0'+s : s}`;
        if(t <= 0) document.getElementById('timer-display').classList.add('expired');
        else document.getElementById('timer-display').classList.remove('expired');
    }

    function setT(m, b) {
        if(r) return; t = initialT = m*60; up();
        document.querySelectorAll('.btn-p').forEach(p => p.classList.remove('active'));
        if(b) b.classList.add('active');
    }

    function setCustom(b) {
        if(r) return;
        let m = prompt("Minuti?", "25");
        if(m) setT(parseInt(m), b);
    }

    function toggleT() {
        whistle.play().then(() => { whistle.pause(); whistle.currentTime = 0; }).catch(()=>{});
        let b = document.getElementById('startBtn'); v(60);
        if(r) { 
            clearInterval(iv); r = false; b.innerText = "RIPRENDI";
            if(wakeLock) wakeLock.release();
            document.getElementById('statusDot').classList.remove('active');
        } else { 
            if(t <= 0) return;
            r = true; b.innerText = "PAUSA";
            requestWakeLock();
            endTime = Date.now() + (t * 1000);
            iv = setInterval(() => { 
                t = Math.round((endTime - Date.now()) / 1000);
                up(); 
                if(t <= 0) { 
                    clearInterval(iv); r = false; whistle.play();
                    v([1000, 200, 1000]);
                    b.innerText = "TEMPO FINITO";
                } 
            }, 1000);
        }
    }

    function sc(id, val, teamInputId) {
        let e = document.getElementById(id), c = parseInt(e.innerText);
        if(c+val >= 0) { 
            e.innerText = c+val; 
            v(val > 0 ? 100 : 50); 
            if(val > 0) logGoal(teamInputId);
            else removeLastGoal(teamInputId);
        }
    }

    function logGoal(teamInputId) {
        let teamName = document.getElementById(teamInputId).value;
        let minute = Math.floor((initialT - t) / 60) + 1;
        let entry = document.createElement('div');
        entry.className = 'entry entry-goal';
        entry.dataset.team = teamInputId;
        entry.innerHTML = `<b>${teamName}</b> <span>${minute}'</span>`;
        document.getElementById('goalLog').prepend(entry);
    }

    function removeLastGoal(teamInputId) {
        let log = document.getElementById('goalLog');
        let entries = log.getElementsByClassName('entry-goal');
        for (let e of entries) { if (e.dataset.team === teamInputId) { log.removeChild(e); break; } }
    }

    function savePeriod() {
        v(100);
        let s1 = document.getElementById('s1').innerText;
        let s2 = document.getElementById('s2').innerText;
        periods.push(`${s1} - ${s2}`);
        
        let entry = document.createElement('div');
        entry.className = 'entry entry-period';
        entry.innerHTML = `<b>${periods.length}° Tempo</b> <span>${s1}-${s2}</span>`;
        document.getElementById('periodLog').appendChild(entry);

        // Reset per nuovo tempo
        document.getElementById('s1').innerText = "0";
        document.getElementById('s2').innerText = "0";
        document.getElementById('goalLog').innerHTML = '<div class="log-title">Goal</div>';
        t = initialT; up();
        if(r) toggleT(); // Ferma il timer
        document.getElementById('startBtn').innerText = "AVVIA " + (periods.length + 1) + "° TEMPO";
    }

    function rs() {
        if(confirm("Azzerare tutto?")) location.reload();
    }

    function sh() {
        let n1 = document.getElementById('t1').value, n2 = document.getElementById('t2').value;
        let s1 = document.getElementById('s1').innerText, s2 = document.getElementById('s2').innerText;
        let text = `${n1} - ${n2}: ${s1} - ${s2}`;
        
        if(periods.length > 0) {
            text = `${n1} - ${n2}:\n`;
            periods.forEach((res, i) => { text += `${i+1}° tempo: ${res}\n`; });
            if(s1 > 0 || s2 > 0) text += `Tempo attuale: ${s1} - ${s2}`;
        }
        
        window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
    }
</script>
</body>
</html>
